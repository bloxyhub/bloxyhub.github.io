<!DOCTYPE html>
<html>
    <head>
        <title>Bloxy Hub</title>

        <meta charset = "utf-8">
		<link rel = "shortcut icon" type = "image/x-icon" href="Logo.ico" />

		<meta name = "author" content = "Bloxy Hub" />
		<meta name = "description" content = "Bloxy Hub" />
		<meta name = "keywords" content = "Bloxy, Hub, BloxyHub, script, lua, krnl" />

		<meta property = "og:title" content = "Bloxy Hub" />
		<meta property = "og:description" content = "Official website for Bloxy Hub" />
		<meta property = "og:type" content = "website" />
		<meta property = "og:url" content = "https://bloxyhub.github.io/" />
		<meta property = "og:secure_url" content = "https://bloxyhub.github.io/">
		<meta property = "og:image" content = "https://bloxyhub.github.io/Logo.ico" />

        <style>
           body {
				background-color: rgb(255, 255, 255);
                color: white;
                font-family: "Trebuchet MS";
                background-image: url(Background.png);
				background-attachment: fixed;
				background-size: cover;
				background-repeat: no-repeat;
			}

            body::-webkit-scrollbar {
                width: 12px;
            }
      
            body::-webkit-scrollbar-thumb {
                background-color: rgb(80, 80, 80);
            }

            #gamesLabel {
            
                color: rgb(255, 255, 255);
                border: 0px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <center>
            <h4 id="gamesLabel"></h20>
            <br>
            <br>
        </center>

        <script type="text/javascript"> 
            const gamesBox = document.getElementById("gamesLabel");

            const games = new XMLHttpRequest();
            const gamesURL = "https://bloxyhub.github.io/Games.txt";
            games.open("GET", gamesURL, true);
            games.send();

            games.onreadystatechange = () => {
                gamesBox.innerText = games.responseText;
            }
        </script>
    </body>
</html>
