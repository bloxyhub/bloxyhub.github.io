            <i style="color: rgb(180, 180, 180);"><span style="color: rgb(153, 95, 39);">Bloxy</span> <span style="color: rgb(255, 255, 255);">Hub</span> is a <span style="color: rgb(0, 192, 80);">free</span> Roblox script hub developed by <span style="color: rgb(171, 32, 32);">Lebroyn</span> and <span style="color: rgb(21, 153, 193);">Mustafa</span>.<br>It currently has 1 games. It is made to be executed on Roblox exploits. It works on the exploits that are shown below.</i>

            <br>
            <br>

        <script type="text/javascript">
            const scriptBtn = document.getElementById("scriptBtn");
            const copyPopup = document.getElementById("copyPopup");
            const gamesBtn = document.getElementById("gamesBtn");
            const discordBtn = document.getElementById("discordBtn");

            scriptBtn.addEventListener("click", () => {
                const scriptBox = document.createElement("textarea");
                scriptBox.value = 'loadstring(game:HttpGet("https://raw.githubusercontent.com/bloxyhub/sus/main/bloxy.lua",true))()';
                document.body.appendChild(scriptBox);
                scriptBox.select();
                document.execCommand("copy");
                document.body.removeChild(scriptBox);
                copyPopup.style.display = "block";
                setTimeout(() => {copyPopup.style.display = "none";}, 1000);
            });

            gamesBtn.addEventListener("click", () => {
                window.open("games.html");
            });

            discordBtn.addEventListener("click", () => {
                window.open("https://discord.gg/DxUqXkufsW");
            });
        </script>
